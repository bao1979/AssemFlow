<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sokoban MVP-3 · 多关 + 静态校验 + URL 切关</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #1e1e1e;
        color: #d4d4d4;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
      }
      .hint {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      #grid {
        line-height: 1.1;
        font-size: 24px;
        white-space: pre;
      }
      .sokoban-win {
        margin-top: 16px;
        font-size: 28px;
        font-weight: 700;
        color: #4caf50;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Sokoban MVP-3 · 多关 + 静态校验 + URL 切关</h1>
    <p class="hint">
      方向键 / WASD 移动角色（@）。撞墙（#）不动。<br />
      把所有 <code>$</code> 推到 <code>.</code> 上（变成 <code>*</code>）即胜利。<br />
      按 R 重开。URL 参数 <code>?level=level-push-big</code> 切换关卡。
    </p>
    <!-- 挂载点：渲染层把网格画到这里 -->
    <div id="grid" role="img" aria-label="Sokoban 推箱子游戏网格" tabindex="0"></div>
    <!-- 浏览器入口；Vite 解析 src/main.ts -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
